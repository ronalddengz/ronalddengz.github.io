<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Is This Number Round?</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@3.4.1/dist/css/bootstrap.min.css">
    <style>
        body {
            background-color: #fff;
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            text-align: center;
            padding-top: 40px;
        }

        h1 {
            font-size: 72px;
            font-weight: 700;
            margin-bottom: 30px;
            color: #000;
        }

        .search-container {
            max-width: 700px;
            margin: 0 auto 30px auto;
            padding: 0 15px;
        }

        .input-group {
            width: 100%;
        }

        .input-group .form-control {
            height: 50px;
            font-size: 18px;
            border-radius: 0;
            border: 1px solid #ccc;
        }

        .input-group .form-control:focus {
            border-color: #66afe9;
            box-shadow: inset 0 1px 1px rgba(0, 0, 0, .075), 0 0 8px rgba(102, 175, 233, .6);
        }

        .input-group-btn .btn {
            height: 50px;
            font-size: 18px;
            border-radius: 0;
            background-color: #000;
            color: #fff;
            border: 1px solid #000;
            padding: 0 25px;
            font-weight: 600;
        }

        .input-group-btn .btn:hover {
            background-color: #333;
            border-color: #333;
        }

        #result {
            margin-top: 20px;
        }

        #result h2 {
            font-size: 30px;
            font-weight: 700;
            color: #333;
        }

        #result h4 {
            font-size: 18px;
            font-weight: 400;
            color: #777;
            margin-top: 10px;
        }

        .footer {
            margin-top: 80px;
            padding-bottom: 40px;
        }

        .footer h5 {
            color: #999;
            font-size: 14px;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 42px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Is this number round?</h1>

        <div class="search-container">
            <div class="input-group">
                <input type="text" class="form-control" id="numberInput" placeholder="Enter a number">
                <span class="input-group-btn">
                    <button class="btn" type="button" id="findOutBtn">Find Out</button>
                </span>
            </div>
        </div>

        <div id="result"></div>
    </div>

    <script>
        const input = document.getElementById('numberInput');
        const btn = document.getElementById('findOutBtn');
        const result = document.getElementById('result');

        function classify(numStr) {
            // Strip whitespace
            numStr = numStr.trim();

            // Validate: must be an integer (allow negative, leading zeros ok)
            if (!/^-?\d+$/.test(numStr)) {
                return null;
            }

            const num = BigInt(numStr);
            const lastDigitStr = numStr[numStr.length - 1];

            if (lastDigitStr === '5') {
                return { type: 'pointy-ish', number: numStr };
            } else if (num % 2n === 0n) {
                return { type: 'round', number: numStr };
            } else {
                return { type: 'pointy', number: numStr };
            }
        }

        function showResult() {
            const val = input.value;
            if (!val.trim()) return;

            const res = classify(val);

            if (!res) {
                result.innerHTML = '<h2>Please enter a valid integer.</h2>';
                return;
            }
            let mainText = '';

            switch (res.type) {
                case 'round':
                    mainText = `${res.number} is a round number.`;
                    break;
                case 'pointy':
                    mainText = `${res.number} is a pointy number.`;
                    break;
                case 'pointy-ish':
                    mainText = `${res.number} is a pointy-ish number.`;
                    break;
            }

            result.innerHTML = `<h2>${mainText}</h2>`;
        }

        btn.addEventListener('click', showResult);
        input.addEventListener('keydown', function (e) {
            if (e.key === 'Enter') showResult();
        });
    </script>
</body>

</html>
