        ipTd.style.color = '#e63946';

        const infoTd = document.createElement('td');
        infoTd.textContent = userSubmission;

        tr.appendChild(ipTd);
        tr.appendChild(infoTd);
        tbody.appendChild(tr);

      // Fake data
